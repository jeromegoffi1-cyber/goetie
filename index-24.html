<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0E0D12">
<title>Goétie Intérieure</title>
<meta name="description" content="Travailler avec tes esprits intérieurs — audiences, charges et renforts, sans rien d'occulte.">
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Goétie">
<meta name="application-name" content="Goétie">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" href="icon-192.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap');
:root{
  --ink:#0E0D12;
  --panel:#171520;
  --panel-2:#1F1C29;
  --line:rgba(199,162,75,.16);
  --line-strong:rgba(199,162,75,.32);
  --text:#E8E1D2;
  --muted:#9A9285;
  --faint:#6C6557;
  --gold:#C7A24B;
  --gold-soft:#D9BD79;
  --ember:#9A4B40;
  --sage:#6E8A78;
  --r:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{height:auto}
body{
  background:
    radial-gradient(1100px 700px at 80% -10%, rgba(199,162,75,.06), transparent 60%),
    radial-gradient(900px 600px at -10% 110%, rgba(110,138,120,.05), transparent 55%),
    var(--ink);
  color:var(--text);
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  font-size:14.5px;
  -webkit-font-smoothing:antialiased;
  min-height:100dvh;
  line-height:1.5;
  padding-bottom:calc(124px + env(safe-area-inset-bottom));
}
.serif{font-family:'Spectral',Georgia,serif;}
.val{font-size:12.5px;line-height:1.5;color:var(--text)}
h1,h2,h3,.brand{font-family:'Spectral',Georgia,serif;font-weight:600;letter-spacing:.2px}
.eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);font-weight:600}
.muted{color:var(--muted)}
.faint{color:var(--faint)}
button,input,textarea,select{font-family:inherit;font-size:inherit;color:inherit}
button{cursor:pointer}
a{color:var(--gold-soft)}

/* layout */
.wrap{max-width:760px;margin:0 auto;padding:22px 18px 0}
header.top{display:flex;align-items:center;gap:13px;padding:8px 0 18px}
header.top .mark{width:40px;height:40px;flex:0 0 auto}
header.top .brand{font-size:20px;line-height:1}
header.top .sub{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}

.view{animation:fade .5s ease both}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.card{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);border-radius:var(--r);padding:18px}
.card + .card{margin-top:14px}
.row{display:flex;gap:12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:520px){.grid2{grid-template-columns:1fr}}

/* buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:1px solid var(--line-strong);background:transparent;color:var(--text);padding:12px 16px;border-radius:11px;font-weight:500;transition:.18s;font-size:13px}
.btn:hover{border-color:var(--gold);background:rgba(199,162,75,.06)}
.btn.gold{background:linear-gradient(180deg,#d4ad4f,#b1842f);color:#1a1408;border:none;font-weight:600}
.btn.gold:hover{filter:brightness(1.08)}
.btn.ghost{border-color:var(--line)}
.btn.wide{width:100%}
.btn.sm{padding:8px 12px;font-size:11.5px;border-radius:9px}
.btn.danger:hover{border-color:var(--ember);background:rgba(154,75,64,.1);color:#e7b5ad}

/* dashboard */
.hero{text-align:left;padding:6px 2px 2px}
.hero h1{font-size:30px;line-height:1.05;margin:6px 0 4px}
.hero p{color:var(--muted);max-width:46ch}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:4px}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:13px 12px;text-align:center}
.stat .n{font-family:'Spectral',Georgia,serif;font-size:26.5px;color:var(--gold-soft);line-height:1}
.stat .l{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-top:5px}

.spirit-of-week{display:flex;align-items:center;gap:15px}
.spirit-of-week .seal{flex:0 0 auto}
.cta-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:4px}
@media(max-width:460px){.cta-row{grid-template-columns:1fr}}

/* fiche grid */
.fiche-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:13px}
.fiche{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:15px 13px;text-align:center;transition:.18s;cursor:pointer;position:relative}
.fiche:hover{border-color:var(--gold);transform:translateY(-2px)}
.fiche .nm{font-family:'Spectral',Georgia,serif;font-size:16px;margin-top:9px;line-height:1.1}
.fiche .of{font-size:12px;color:var(--muted);margin-top:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.rang-tag{display:inline-block;font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;padding:3px 8px;border-radius:20px;margin-top:9px;border:1px solid var(--line);color:var(--muted)}
.fam-tag{display:inline-block;font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:20px;border:1px solid;background:rgba(255,255,255,.02)}
.fam-chip{border:1px solid var(--line);border-radius:20px;background:var(--ink);color:var(--muted);padding:7px 12px;font-size:11px;transition:.15s}
.fam-chip.sel{border-color:var(--fc);color:var(--fc);background:color-mix(in srgb,var(--fc) 12%,transparent)}
.gauge-seg{flex:1;height:24px;border-radius:5px;border:1px solid var(--line-strong);background:transparent;padding:0;min-width:0;cursor:pointer;transition:background .12s}
.gauge-seg.on{background:var(--gc)}
.day-row{display:flex;align-items:center;gap:11px;width:100%;background:transparent;border:none;border-bottom:1px solid var(--line);padding:11px 2px;text-align:left;cursor:pointer;color:var(--text)}
.day-row:last-child{border-bottom:none}
.day-dot{width:15px;height:15px;border-radius:50%;border:1px solid var(--line-strong);flex:0 0 auto}
.day-dot.on{background:var(--sc,#C7A24B);border-color:var(--sc,#C7A24B)}
.day-dot.today{border-color:#E8E1D2}
.day-date{font-size:11px;color:var(--muted);flex:0 0 auto;width:84px}
.day-note{font-size:11.5px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.seal-wrap{position:relative;display:inline-block;line-height:0}
.glyph-badge{position:absolute;right:-4px;bottom:-4px;width:var(--bs);height:var(--bs);border-radius:50%;background:var(--ink);border:1px solid var(--gold);color:var(--gold-soft);display:flex;align-items:center;justify-content:center;line-height:1}

.empty{text-align:center;padding:34px 16px;color:var(--muted)}
.empty .seal{margin:0 auto 14px;opacity:.5}

/* form */
label.f{display:block;font-size:12px;letter-spacing:.05em;color:var(--muted);margin:0 0 6px;text-transform:uppercase}
.field{margin-bottom:15px}
input.t,textarea.t,select.t{width:100%;background:var(--ink);border:1px solid var(--line);border-radius:10px;padding:12px 13px;color:var(--text);font-size:13px;transition:.15s}
input.t:focus,textarea.t:focus,select.t:focus{outline:none;border-color:var(--gold)}
textarea.t{resize:vertical;min-height:74px;line-height:1.5}
.hint{font-size:12px;color:var(--faint);margin-top:6px;font-style:italic}

/* glyph picker */
.glyphs{display:flex;flex-wrap:wrap;gap:8px}
.glyph{width:42px;height:42px;border:1px solid var(--line);border-radius:10px;background:var(--ink);display:flex;align-items:center;justify-content:center;font-size:17.5px;transition:.15s}
.glyph.sel{border-color:var(--gold);background:rgba(199,162,75,.1)}

/* modal */
.scrim{position:fixed;inset:0;background:rgba(6,5,9,.72);backdrop-filter:blur(3px);display:flex;align-items:flex-end;justify-content:center;z-index:50;padding:0;animation:fade .25s ease}
@media(min-width:600px){.scrim{align-items:center;padding:20px}}
.modal{position:relative;background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line-strong);border-radius:18px 18px 0 0;width:100%;max-width:560px;max-height:92vh;overflow:auto;padding:22px 20px calc(30px + env(safe-area-inset-bottom))}
@media(min-width:600px){.modal{border-radius:18px}}
.modal h2{font-size:22px;margin-bottom:3px}
.modal .close{position:sticky;top:0;float:right;margin:-6px -4px 0 0;background:none;border:none;color:var(--muted);font-size:21px;line-height:1}

/* audience stepper */
.steps{display:flex;gap:6px;margin-bottom:20px}
.step-dot{flex:1;height:3px;background:var(--line);border-radius:3px;transition:.3s}
.step-dot.on{background:var(--gold)}
.phase{text-align:center}
.phase .num{font-family:'Spectral',Georgia,serif;font-size:11.5px;letter-spacing:.3em;color:var(--gold);text-transform:uppercase}
.phase h2{font-size:26.5px;margin:6px 0 2px}
.phase .role{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:18px}
.anchor{font-family:'Spectral',Georgia,serif;font-size:19.5px;font-style:italic;color:var(--gold-soft);line-height:1.4;padding:18px 10px;border-top:1px solid var(--line);border-bottom:1px solid var(--line);margin:8px 0 20px}
.breath{width:120px;height:120px;border-radius:50%;border:1.5px solid var(--gold);margin:10px auto 18px;display:flex;align-items:center;justify-content:center;font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);animation:breathe 8s ease-in-out infinite}
@keyframes breathe{0%,100%{transform:scale(.78);border-color:rgba(199,162,75,.3)}50%{transform:scale(1);border-color:var(--gold)}}

/* journal */
.entry{border-left:2px solid var(--line-strong);padding:4px 0 4px 15px;margin-bottom:16px}
.fold-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;cursor:pointer}
.fold-body{display:none;margin-top:2px}
.fold.open>.fold-body{display:block}
.chev{flex:0 0 auto;color:var(--faint);transition:transform .22s;font-size:17px;line-height:1.2;align-self:center}
.fold.open .chev{transform:rotate(90deg)}
.entry .d{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint)}
.entry .h{font-family:'Spectral',Georgia,serif;font-size:16.5px;margin:2px 0 5px}
.entry .kv{font-size:12.5px;line-height:1.5;color:var(--muted);margin-top:4px}
.entry .kv b{color:var(--text);font-weight:500}
.entry .cmts{margin-top:9px;display:flex;flex-direction:column;gap:6px}
.entry .cmt{font-size:12px;line-height:1.5;color:var(--text);background:var(--ink);border:1px solid var(--line);border-radius:8px;padding:7px 10px}
.entry .cmt .cd{display:block;font-size:9.5px;letter-spacing:.09em;text-transform:uppercase;color:var(--faint);margin-bottom:3px}
.tag-express{font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--sage);border:1px solid var(--line);padding:2px 7px;border-radius:12px;margin-left:6px}

/* repères */
.acc{border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-bottom:10px}
.acc summary{padding:15px 16px;cursor:pointer;list-style:none;display:flex;justify-content:space-between;align-items:center;font-family:'Spectral',Georgia,serif;font-size:16.5px}
.acc summary::-webkit-details-marker{display:none}
.acc summary .chev{color:var(--gold);transition:.2s}
.acc[open] summary .chev{transform:rotate(90deg)}
.acc .body{padding:0 16px 16px;color:var(--muted);font-size:13px;line-height:1.6}
.acc .body p{margin-bottom:9px}
.acc .body b{color:var(--text);font-weight:500}
.phase-mini{display:flex;gap:12px;align-items:flex-start;margin-bottom:13px}
.phase-mini .ring{flex:0 0 auto;width:30px;height:30px;border:1px solid var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--gold);font-family:'Spectral',serif;font-size:13px}

/* nav */
nav.tabs{position:fixed;bottom:0;left:0;right:0;background:rgba(14,13,18,.92);backdrop-filter:blur(12px);border-top:1px solid var(--line);display:flex;justify-content:center;padding:8px 6px calc(8px + env(safe-area-inset-bottom));z-index:40}
nav.tabs .inner{display:flex;gap:2px;max-width:760px;width:100%;justify-content:flex-start;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
nav.tabs .inner::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;min-width:62px;background:none;border:none;color:var(--muted);padding:7px 8px;border-radius:10px;display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10.5px;letter-spacing:.02em;transition:.15s;scroll-snap-align:center}
.tab svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.4}
.tab.on{color:var(--gold)}
.toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:var(--panel-2);border:1px solid var(--gold);color:var(--text);padding:11px 18px;border-radius:30px;font-size:12.5px;z-index:60;animation:fade .2s ease;box-shadow:0 8px 30px rgba(0,0,0,.5)}
.divider{height:1px;background:var(--line);margin:18px 0}

/* ===== immersion rituelle ===== */
.rite{position:relative}
.rite::before{content:'';position:absolute;top:-30px;left:50%;transform:translateX(-50%);width:260px;height:170px;background:radial-gradient(ellipse at center top,rgba(199,162,75,.12),transparent 70%);pointer-events:none;animation:censer 7s ease-in-out infinite;z-index:0}
@keyframes censer{0%,100%{opacity:.45}50%{opacity:1}}
.rite > *{position:relative;z-index:1}
.rite-intro{font-family:'Spectral',Georgia,serif;font-size:14.5px;font-style:italic;line-height:1.5;color:var(--text);text-align:center;max-width:42ch;margin:0 auto 16px;opacity:.92}

/* cercle magique */
.circle-stage{position:relative;margin:8px auto 16px}
.mcircle{position:absolute;inset:0;overflow:visible}
.circle-center{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.spin-s{transform-origin:50% 50%;animation:spin 42s linear infinite}
.spin-r{transform-origin:50% 50%;animation:spin 30s linear infinite reverse}
@keyframes spin{to{transform:rotate(360deg)}}
.pulse-c{transform-origin:50% 50%;animation:pulseC 6s ease-in-out infinite}
@keyframes pulseC{0%,100%{opacity:.2}50%{opacity:.6}}

/* orbe de souffle synchronisé */
.breath2{position:relative;width:118px;height:118px}
.breath2 .ring,.breath2 .halo{position:absolute;inset:0;border-radius:50%;animation:breathe2 10.5s ease-in-out infinite}
.breath2 .ring{border:1.5px solid var(--gold)}
.breath2 .halo{background:radial-gradient(circle,rgba(199,162,75,.22),transparent 66%)}
.breath2 .cues{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.breath2 .cue{position:absolute;font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--gold-soft)}
.breath2 .c1{animation:cueA 10.5s ease-in-out infinite}
.breath2 .c2{animation:cueB 10.5s ease-in-out infinite}
.breath2 .c3{animation:cueC 10.5s ease-in-out infinite}
@keyframes breathe2{0%{transform:scale(.7)}42%{transform:scale(1)}57%{transform:scale(1)}100%{transform:scale(.7)}}
@keyframes cueA{0%,34%{opacity:1}42%,100%{opacity:0}}
@keyframes cueB{0%,40%{opacity:0}45%,55%{opacity:1}60%,100%{opacity:0}}
@keyframes cueC{0%,58%{opacity:0}66%,94%{opacity:1}100%{opacity:0}}

/* triangle de l'art + manifestation du sceau */
.tri-stage{position:relative;margin:8px auto 16px}
.triangle-art{position:absolute;inset:0;overflow:visible}
.triangle-art .tri{animation:triGlow 5s ease-in-out infinite}
@keyframes triGlow{0%,100%{opacity:.4}50%{opacity:.9}}
.tri-center{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.manifest{animation:manifest 1s ease both}
@keyframes manifest{from{opacity:0;transform:scale(.62) rotate(-8deg)}to{opacity:1;transform:none}}
.seal-breathe{animation:sealPulse 5.5s ease-in-out infinite;transform-origin:center}
@keyframes sealPulse{0%,100%{opacity:.85;transform:scale(.97)}50%{opacity:1;transform:scale(1.03)}}

/* dissolution du congé */
.dissolve{animation:dissolve 6s ease-in-out infinite}
@keyframes dissolve{0%,100%{opacity:.9;filter:blur(0)}50%{opacity:.5;filter:blur(1.2px)}}

/* voile qui s'ouvre entre les phases */
.veil{position:absolute;inset:0;z-index:8;pointer-events:none;display:flex;overflow:hidden;border-radius:18px}
.veil .vh{flex:1;background:linear-gradient(180deg,#16131f,#0E0D12)}
.veil .vl{animation:veilL .9s cubic-bezier(.66,0,.2,1) forwards}
.veil .vr{animation:veilR .9s cubic-bezier(.66,0,.2,1) forwards}
@keyframes veilL{from{transform:translateX(0)}to{transform:translateX(-102%)}}
@keyframes veilR{from{transform:translateX(0)}to{transform:translateX(102%)}}
.veil .seam{position:absolute;top:0;bottom:0;left:50%;width:2px;transform:translateX(-50%);background:linear-gradient(180deg,transparent,var(--gold),var(--gold-soft),var(--gold),transparent);box-shadow:0 0 14px var(--gold);animation:seam .9s ease forwards}
@keyframes seam{0%{opacity:1}70%{opacity:1}100%{opacity:0}}

/* entrée du contenu de phase */
.rite{animation:riteIn .9s .18s ease both}
@keyframes riteIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.phase .num{animation:numIn 1.1s ease both}
@keyframes numIn{from{letter-spacing:.6em;opacity:0}to{letter-spacing:.3em;opacity:1}}

/* bouton son */
.snd{position:sticky;top:0;float:left;margin:-4px 0 0 -2px;background:none;border:none;color:var(--gold);z-index:9;padding:2px}
.snd.off{color:var(--faint)}
.snd svg{width:19px;height:19px;stroke:currentColor;fill:none;stroke-width:1.5;vertical-align:middle}

/* flamme du seuil */
.flame-wrap{display:flex;justify-content:center;margin:6px auto 14px}
.flame{transform-origin:center bottom;animation:flick 2.6s ease-in-out infinite}
@keyframes flick{0%,100%{transform:scale(1) rotate(-1.5deg);opacity:.92}50%{transform:scale(1.06) rotate(1.5deg);opacity:1}}
.flame-halo{animation:halo 2.6s ease-in-out infinite}
@keyframes halo{0%,100%{opacity:.3}50%{opacity:.6}}

/* cercle et, à l'écart, le triangle */
.ct-stage{display:flex;align-items:center;justify-content:center;gap:6px;margin:10px auto 16px}
.ct-circle{position:relative;flex:0 0 auto}
.ct-link{display:flex;flex-direction:column;gap:6px;flex:0 0 auto}
.ct-link span{width:5px;height:5px;border-radius:50%;background:var(--gold);animation:linkP 2.4s ease-in-out infinite}
.ct-link span:nth-child(2){animation-delay:.35s}
.ct-link span:nth-child(3){animation-delay:.7s}
@keyframes linkP{0%,100%{opacity:.12}50%{opacity:.7}}
.self-dot{width:9px;height:9px;border-radius:50%;display:inline-block;animation:pulseC 4.5s ease-in-out infinite}
.ct-label{text-align:center;font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--faint);margin-top:5px}
.breath-mini{position:relative;width:58px;height:58px}
.breath-mini .bm-ring,.breath-mini .bm-halo{position:absolute;inset:0;border-radius:50%;animation:breathe2 10.5s ease-in-out infinite}
.breath-mini .bm-ring{border:1.4px solid var(--gold)}
.breath-mini .bm-halo{background:radial-gradient(circle,rgba(199,162,75,.28),transparent 64%)}

/* page guide — élégante et lisible (Spectral) */
.guide h2{font-family:'Spectral',Georgia,serif;font-weight:600;letter-spacing:.01em}
.guide .eyebrow{font-family:'Spectral',Georgia,serif;font-weight:600;letter-spacing:.16em}
.guide > p, .guide .body p, .guide .phase-mini > div{font-family:'Spectral',Georgia,serif;font-size:14px;line-height:1.55;letter-spacing:.1px;color:var(--text)}
.guide .body p{margin:0 0 9px}
.guide .body p:last-child{margin-bottom:0}
.guide .acc summary{font-family:'Spectral',Georgia,serif;font-size:14.5px;letter-spacing:.01em;font-weight:600}
.guide .phase-mini > div b, .guide .body p b{font-weight:600;color:var(--gold-soft)}
.guide code{font-size:12px}

@media(prefers-reduced-motion:reduce){*{animation:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <svg class="mark" viewBox="0 0 100 100" id="brandMark"></svg>
    <div>
      <div class="brand">Goétie Intérieure</div>
      <div class="sub">Tenir audience &middot; puis renvoyer au vase</div>
    </div>
  </header>
  <main id="app"></main>
</div>

<nav class="tabs"><div class="inner" id="tabs"></div></nav>

<script>
/* ============ stockage (localStorage + repli mémoire) ============ */
const KEY='goetie_interieure_v1';
const mem={};
const Store={
  read(){try{const r=localStorage.getItem(KEY);return r?JSON.parse(r):null}catch(e){return mem[KEY]||null}},

/* ============ sceau génératif (SVG déterministe d'après un nom) ============ */
function hash(str){let h=2166136261;for(let i=0;i<str.length;i++){h^=str.charCodeAt(i);h=Math.imul(h,16777619)}return h>>>0}
function rng(seed){let s=seed||1;return()=>{s=Math.imul(s^s>>>15,2246822519);s^=s>>>13;s=Math.imul(s,3266489917);return((s>>>0)/4294967296)}}
function seal(name,size=66,stroke='#C7A24B',glyph){
  const r=rng(hash(name||'esprit')||7);const c=size/2,R=size*0.4;
  const n=4+Math.floor(r()*5);const pts=[];
  for(let i=0;i<n;i++){const a=r()*Math.PI*2;const rad=R*(0.55+r()*0.45);pts.push([c+Math.cos(a)*rad,c+Math.sin(a)*rad])}
  let path='M'+pts.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join(' L')+' Z';
  let nodes=pts.map(p=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="${(1.3+r()*1.6).toFixed(1)}" fill="${stroke}" opacity="0.9"/>`).join('');
  let cross='';const cn=1+Math.floor(r()*2);
  for(let i=0;i<cn;i++){const a=r()*Math.PI;cross+=`<line x1="${(c-Math.cos(a)*R).toFixed(1)}" y1="${(c-Math.sin(a)*R).toFixed(1)}" x2="${(c+Math.cos(a)*R).toFixed(1)}" y2="${(c+Math.sin(a)*R).toFixed(1)}" stroke="${stroke}" stroke-width="0.7" opacity="0.5"/>`}
  return `<svg class="seal" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${c}" cy="${c}" r="${R+3}" fill="none" stroke="${stroke}" stroke-width="0.8" opacity="0.35"/>
    <circle cx="${c}" cy="${c}" r="${R}" fill="none" stroke="${stroke}" stroke-width="0.6" opacity="0.25"/>
    ${cross}
    <path d="${path}" fill="none" stroke="${stroke}" stroke-width="1.1" stroke-linejoin="round" opacity="0.85"/>
    ${nodes}
  </svg>`;
}
/* sceau (motif unique) + médaillon glyphe posé à côté, sans masquer le motif */
function sealBlock(name,size,glyph,color){color=color||'#C7A24B';
  const badge=glyph?`<span class="glyph-badge" style="--bs:${Math.max(18,Math.round(size*0.34))}px;font-size:${Math.max(11,Math.round(size*0.2))}px;border-color:${color};color:${color}">${glyph}</span>`:'';
  return `<span class="seal-wrap">${seal(name,size,color)}${badge}</span>`;
}
function ficheColor(f){return (f&&f.famille)?famColor(f.famille):'#C7A24B'}

function magicCircleSVG(size,color){color=color||'#C7A24B';const c=size/2,R=size*0.46;
  let ticks='';const N=48;
  for(let i=0;i<N;i++){const a=i/N*Math.PI*2,big=i%4===0,r1=R,r2=R-(big?9:5);
    ticks+=`<line x1="${(c+Math.cos(a)*r1).toFixed(1)}" y1="${(c+Math.sin(a)*r1).toFixed(1)}" x2="${(c+Math.cos(a)*r2).toFixed(1)}" y2="${(c+Math.sin(a)*r2).toFixed(1)}" stroke="${color}" stroke-width="${big?1:0.5}" opacity="0.5"/>`}
  const gl=['☉','☽','☿','♀','♂','♃','♄'];let glyphs='';
  for(let i=0;i<gl.length;i++){const a=-Math.PI/2+i/gl.length*Math.PI*2,rr=R-19;
    glyphs+=`<text x="${(c+Math.cos(a)*rr).toFixed(1)}" y="${(c+Math.sin(a)*rr+4).toFixed(1)}" text-anchor="middle" font-size="12" fill="${color}" opacity="0.55">${gl[i]}</text>`}
  return `<svg class="mcircle" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle class="pulse-c" cx="${c}" cy="${c}" r="${R+5}" fill="none" stroke="${color}" stroke-width="0.6"/>
    <g class="spin-s"><circle cx="${c}" cy="${c}" r="${R}" fill="none" stroke="${color}" stroke-width="0.8" opacity="0.55"/>${ticks}</g>
    <g class="spin-r">${glyphs}<circle cx="${c}" cy="${c}" r="${R-27}" fill="none" stroke="${color}" stroke-width="0.5" opacity="0.35" stroke-dasharray="2 7"/></g>
  </svg>`;}
function circleStage(centerHTML,color,size){size=size||196;

  const dots=pts.map(p=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="2.6" fill="${color}" opacity="0.85"/>`).join('');
  return `<svg class="triangle-art" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">

let _actx=null,_sound=!(state.settings&&state.settings.sound===false);
function actx(){if(!_actx){try{_actx=new (window.AudioContext||window.webkitAudioContext)()}catch(e){_actx=null}}if(_actx&&_actx.state==='suspended'){try{_actx.resume()}catch(e){}}return _actx}
function tone(freq,dur,type,gain,when){const a=actx();if(!a)return;const t=(when||0)+a.currentTime;const o=a.createOscillator(),g=a.createGain();o.type=type||'sine';o.frequency.value=freq;o.connect(g);g.connect(a.destination);g.gain.setValueAtTime(0.0001,t);g.gain.linearRampToValueAtTime(gain||0.05,t+0.05);g.gain.exponentialRampToValueAtTime(0.0001,t+dur);o.start(t);o.stop(t+dur+0.06)}
function riteSound(kind){if(!_sound)return;
  if(kind==='enter'){tone(196,2.4,'sine',0.05);tone(294,2.4,'sine',0.035,0.02)}
  else if(kind==='step'){tone(330,0.9,'sine',0.045)}
  else if(kind==='name'){tone(262,1.3,'triangle',0.035);tone(392,1.3,'sine',0.03,0.02)}
  else if(kind==='seal'){tone(147,2.6,'sine',0.06);tone(220,2.6,'sine',0.04,0.03);tone(294,2.6,'sine',0.03,0.06)}
  else if(kind==='release'){tone(330,1.8,'sine',0.045);tone(247,1.8,'sine',0.04,0.25);tone(196,1.8,'sine',0.04,0.5)}
  else if(kind==='boost'){tone(392,1.4,'sine',0.05);tone(523,1.4,'sine',0.035,0.03)}
}
/* ---- Drone d'ambiance continu : bourdon en quinte + battements lents pour transe légère ---- */
let _drone=null,_riteActive=false;
function startDrone(){
  if(!_sound)return;
  const a=actx();if(!a||_drone)return;
  const now=a.currentTime;
  const master=a.createGain();master.gain.setValueAtTime(0.0001,now);master.connect(a.destination);
  const lp=a.createBiquadFilter();lp.type='lowpass';lp.frequency.value=520;lp.Q.value=2;lp.connect(master);
  const oscs=[],lfos=[];
  // sous-grave (profondeur)
  const sub=a.createOscillator();sub.type='sine';sub.frequency.value=55;
  const subg=a.createGain();subg.gain.value=0.42;sub.connect(subg);subg.connect(lp);sub.start(now);oscs.push(sub);
  // voix du pad : fondamentale + quinte + octave, chacune dédoublée et désaccordée -> battements lents
  [110,164.81,220].forEach((f,i)=>{
    [-3.5,3.5].forEach(cents=>{
      const o=a.createOscillator();o.type='sawtooth';o.frequency.value=f;o.detune.value=cents;
      const g=a.createGain();g.gain.value=(i===2?0.10:0.13);
      o.connect(g);g.connect(lp);o.start(now);oscs.push(o);
    });
  });
  // scintillement éthéré aigu, avec trémolo très lent
  const sh=a.createOscillator();sh.type='sine';sh.frequency.value=880;
  const shg=a.createGain();shg.gain.value=0.006;sh.connect(shg);shg.connect(master);
  const shLfo=a.createOscillator();shLfo.type='sine';shLfo.frequency.value=0.08;
  const shLfoG=a.createGain();shLfoG.gain.value=0.006;shLfo.connect(shLfoG);shLfoG.connect(shg.gain);
  sh.start(now);shLfo.start(now);oscs.push(sh);lfos.push(shLfo);
  // respiration du timbre (filtre) très lente
  const fLfo=a.createOscillator();fLfo.type='sine';fLfo.frequency.value=0.05;
  const fLfoG=a.createGain();fLfoG.gain.value=230;fLfo.connect(fLfoG);fLfoG.connect(lp.frequency);fLfo.start(now);lfos.push(fLfo);
  // respiration du volume très lente
  const aLfo=a.createOscillator();aLfo.type='sine';aLfo.frequency.value=0.07;
  const aLfoG=a.createGain();aLfoG.gain.value=0.018;aLfo.connect(aLfoG);aLfoG.connect(master.gain);aLfo.start(now);lfos.push(aLfo);
  // fondu d'entrée
  master.gain.linearRampToValueAtTime(0.08,now+3.5);
  _drone={master,oscs,lfos,stop(){
    const a2=actx();if(!a2)return;const t=a2.currentTime;
    try{master.gain.cancelScheduledValues(t);master.gain.setValueAtTime(Math.max(0.0001,master.gain.value),t);master.gain.linearRampToValueAtTime(0.0001,t+1.4)}catch(e){}
    oscs.concat(lfos).forEach(o=>{try{o.stop(t+1.6)}catch(e){}});
    setTimeout(()=>{try{master.disconnect()}catch(e){}},1900);
  }};
}
function stopDrone(){if(_drone){_drone.stop();_drone=null}}
function haptic(p){try{if(navigator.vibrate)navigator.vibrate(p)}catch(e){}}
function riteCue(kind){riteSound(kind);if(kind==='seal'||kind==='release'||kind==='boost')haptic([12,40,16]);else if(kind==='enter')haptic([10,30,10]);else haptic(9)}
function toggleSound(btn){_sound=!_sound;state.settings=state.settings||{};state.settings.sound=_sound;save();if(_sound){actx();if(_riteActive)startDrone();riteSound('step')}else{stopDrone()}if(btn){btn.classList.toggle('off',!_sound);btn.innerHTML=sndIcon()}}

/* ---- Suivi des charges (jour par jour, avec commentaires) ---- */
function dayShort(key){const d=new Date(key+'T00:00:00');return d.toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'numeric'}).replace('.','')}
function dayLong(key){const d=new Date(key+'T00:00:00');return d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'})}
function dayList(c,maxDays=120){const log=c.log||[],notes=c.notes||{};let rows='';
  const start=new Date(c.date||Date.now());start.setHours(0,0,0,0);
  const today0=new Date();today0.setHours(0,0,0,0);
  let n=Math.round((today0-start)/86400000)+1;if(!(n>=1))n=1;if(n>maxDays)n=maxDays;
  for(let i=0;i<n;i++){const k=daysAgoKey(i),on=log.includes(k),note=notes[k]||'',today=i===0;
    rows+=`<button class="day-row" onclick="openDay('${c.id}','${k}')">
      <span class="day-dot ${on?'on':''} ${today?'today':''}"></span>
      <span class="day-date">${dayShort(k)}${today?' · auj.':''}</span>
      <span class="day-note">${note?esc(note):'<span class="faint">+ note</span>'}</span>
      <span class="faint" style="flex:0 0 auto">›</span>
    </button>`;}
  return `<div>${rows}</div>`;}
function openDay(cid,key){
  const e=state.journal.find(x=>x.id===cid);if(!e)return;
  const done=(e.log||[]).includes(key),note=(e.notes||{})[key]||'';
  modal(`<button class="close" onclick="closeModal()">&times;</button>
    <div class="eyebrow">${esc(e.ficheNom||'')}</div>
    <h2 style="margin-bottom:4px;text-transform:capitalize">${dayLong(key)}</h2>
    <p class="muted" style="font-size:11.5px;margin-bottom:18px">${esc(e.pas||e.charge||'')}</p>
    <label style="display:flex;gap:11px;align-items:center;margin-bottom:18px;font-size:13px;cursor:pointer"><input type="checkbox" id="dayDone" ${done?'checked':''} style="accent-color:#C7A24B;width:19px;height:19px"> Honoré ce jour-là</label>
    <div class="field"><label class="f">Ce qu'il s'est passé</label><textarea class="t" id="dayNote" style="min-height:130px" placeholder="note libre sur cette journée — ce que tu as fait, ressenti, observé…">${esc(note)}</textarea></div>
    <button class="btn gold wide" onclick="saveDay('${cid}','${key}')">Enregistrer</button>`);
}
function saveDay(cid,key){
  const e=state.journal.find(x=>x.id===cid);if(!e)return;
  e.log=e.log||[];e.notes=e.notes||{};
  const done=document.getElementById('dayDone').checked,i=e.log.indexOf(key);
  if(done&&i<0)e.log.push(key);if(!done&&i>=0)e.log.splice(i,1);
  const t=document.getElementById('dayNote').value.trim();
  if(t)e.notes[key]=t;else delete e.notes[key];
  save();closeModal();render();toast('Jour enregistré')
}
let _open=new Set();
function toggleFold(id){if(_open.has(id))_open.delete(id);else _open.add(id);const el=document.querySelector('[data-fold="'+id+'"]');if(el)el.classList.toggle('open',_open.has(id))}

/* ---- Journal ---- */
function entryCommentsHTML(e){
  let items=[];
  if(e.mode==='audience'||e.mode==='express'||e.mode==='boost'){
    items=(e.comments||[]).slice().sort((a,b)=>new Date(b.date)-new Date(a.date)).map(c=>({d:fmtDate(c.date),t:c.text}));
  } else if(e.mode==='charge'){
    items=Object.keys(e.notes||{}).sort().reverse().map(k=>({d:dayLong(k),t:(e.notes||{})[k]}));
  }
  items=items.filter(it=>it.t&&it.t.trim());
  if(!items.length)return '';
  return `<div class="cmts">${items.map(it=>`<div class="cmt"><span class="cd">${esc(it.d)}</span>${esc(it.t)}</div>`).join('')}</div>`;
}

function delEntry(id){
  const e=state.journal.find(x=>x.id===id);

  else if(e&&e.mode==='audience')msg='⚠ Supprimer cette audience&nbsp;?<br><br>Attention&nbsp;: elle disparaîtra <b style="color:#E0A89E">aussi de l\'onglet Audiences</b>, avec ses commentaires.';

    state.journal=state.journal.filter(x=>x.id!==id);save();render();toast('Entrée supprimée')

}
function clearJournal(){

  });
}

function delAudienceComment(eid,cid){

function confirmAction(msg,label,onYes){

/* ============ helpers de suivi ============ */
function entriesFor(fic){return state.journal.filter(e=>(fic.id&&e.ficheId===fic.id)||(e.ficheNom&&fic.nom&&e.ficheNom.toLowerCase()===fic.nom.toLowerCase()))}
function sparkline(vals,w=200,h=46,color){color=color||'#C7A24B';
  if(!vals.length)return '';if(vals.length===1)vals=[vals[0],vals[0]];
  const max=10,min=1,stepX=w/(vals.length-1);
  const pts=vals.map((v,i)=>[i*stepX,h-((v-min)/(max-min))*(h-8)-4]);
  const d='M'+pts.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join(' L');
  const dots=pts.map(p=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="2.4" fill="${color}"/>`).join('');
  return `<svg width="100%" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><path d="${d}" fill="none" stroke="${color}" stroke-width="1.5" opacity="0.85"/>${dots}</svg>`;
}
function gaugeIntensity(v){
  v=Math.max(1,Math.min(10,Math.round(v||5)));
  const cx=110,cy=106,R=92;
  const th=(180-((v-1)/9)*180)*Math.PI/180;
  const nx=cx+Math.cos(th)*R*0.78, ny=cy-Math.sin(th)*R*0.78;
  let ticks='';
  for(let i=1;i<=10;i++){const a=(180-((i-1)/9)*180)*Math.PI/180;
    const x1=cx+Math.cos(a)*R*0.99,y1=cy-Math.sin(a)*R*0.99;
    const x2=cx+Math.cos(a)*R*0.87,y2=cy-Math.sin(a)*R*0.87;
    const onv=i<=v;
    ticks+=`<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="${onv?'#D9BD79':'#6C6557'}" stroke-width="${onv?1.8:1}" opacity="${onv?0.85:0.45}"/>`;}
  const col=v<=3?'#6E8A78':v<=6?'#C7A24B':'#9A4B40';
  const word=v<=3?'apaisé':v<=6?'présent':'submergé';
  const gid='gg'+Math.floor(Math.random()*1e6);
  return `<svg width="100%" viewBox="0 0 220 130" style="max-width:260px;display:block;margin:0 auto">
    <defs><linearGradient id="${gid}" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#6E8A78"/><stop offset="0.5" stop-color="#C7A24B"/><stop offset="1" stop-color="#9A4B40"/>
    </linearGradient></defs>
    <path d="M 18 106 A 92 92 0 0 1 202 106" fill="none" stroke="url(#${gid})" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
    ${ticks}
    <line x1="110" y1="106" x2="${nx.toFixed(1)}" y2="${ny.toFixed(1)}" stroke="${col}" stroke-width="3" stroke-linecap="round"/>
    <circle cx="110" cy="106" r="5" fill="${col}"/>
    <text x="110" y="76" text-anchor="middle" font-family="Spectral,Georgia,serif" font-size="42" fill="${col}">${v}</text>
    <text x="110" y="96" text-anchor="middle" font-size="12" fill="#9A9285" letter-spacing="1">/ 10 · ${word}</text>
    <text x="8" y="124" text-anchor="start" font-size="9.5" fill="#6E8A78" letter-spacing="1.5">APAISÉ</text>
    <text x="212" y="124" text-anchor="end" font-size="9.5" fill="#C58A7E" letter-spacing="1.5">SUBMERGÉ</text>
  </svg>`;
}
function intensityField(id,val,color){color=color||'#C7A24B';const v=val||5;let segs='';for(let i=1;i<=10;i++)segs+=`<button type="button" class="gauge-seg ${i<=v?'on':''}" onclick="setGauge('${id}',${i})"></button>`;
  return `<input type="hidden" id="${id}" value="${v}">
  <div style="display:flex;align-items:center;gap:12px">
    <div id="${id}seg" style="display:flex;gap:4px;flex:1;--gc:${color}">${segs}</div>
    <span id="${id}v" class="serif" style="font-size:21px;color:${color};min-width:26px;text-align:center">${v}</span>
  </div>`}
function setGauge(id,v){const h=document.getElementById(id);if(!h)return;h.value=v;const lbl=document.getElementById(id+'v');if(lbl)lbl.textContent=v;document.querySelectorAll('#'+id+'seg .gauge-seg').forEach((b,i)=>b.classList.toggle('on',(i+1)<=v))}
function togglePas(eid){const e=state.journal.find(x=>x.id===eid);if(e){e.pasDone=!e.pasDone;save();render();const d=document.getElementById('scrim');if(d&&e._detailId)openDetail(e._detailId,true);toast(e.pasDone?'Pas accompli ✦':'Pas rouvert')}}

/* suivi quotidien des charges */
function dayKey(d){d=d||new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function daysAgoKey(n){const d=new Date();d.setDate(d.getDate()-n);return dayKey(d)}
function honoredToday(e){return (e.log||[]).includes(dayKey())}
function chargeStreak(e){const log=e.log||[];let i=log.includes(dayKey())?0:1,n=0;while(log.includes(daysAgoKey(i))){n++;i++}return n}
function activeChargeOf(f){const cs=entriesFor(f).filter(e=>e.mode==='charge'&&e.pas);if(!cs.length)return null;const fl=cs.filter(e=>e.active!==false);return (fl.length?fl:cs).sort((a,b)=>new Date(b.date)-new Date(a.date))[0]}
function toggleCharge(id){const e=state.journal.find(x=>x.id===id);if(!e)return;e.log=e.log||[];const k=dayKey(),i=e.log.indexOf(k);if(i>=0)e.log.splice(i,1);else e.log.push(k);save();const s=document.getElementById('scrim');render();if(s&&e._detailId)openDetail(e._detailId,true);toast(i>=0?'Décoché':'Honoré aujourd\'hui ✦')}
function chargeStrip(e,days=14,color){color=color||'#C7A24B';const log=e.log||[];
  const start=new Date(e.date||Date.now());start.setHours(0,0,0,0);
  const today0=new Date();today0.setHours(0,0,0,0);
  let n=Math.round((today0-start)/86400000)+1;if(!(n>=1))n=1;if(n>days)n=days;
  let out='';for(let i=n-1;i>=0;i--){const k=daysAgoKey(i),on=log.includes(k),today=i===0;out+=`<span title="${k}" style="width:13px;height:13px;border-radius:4px;flex:0 0 auto;background:${on?color:'transparent'};border:1px solid ${today?'#E8E1D2':on?color:'var(--line-strong)'}"></span>`}return `<div style="display:flex;gap:4px;flex-wrap:wrap">${out}</div>`}
function logMeasure(kind,ficheId,sliderId){const v=+document.getElementById(sliderId).value;const f=state.fiches.find(x=>x.id===ficheId);if(!f)return;const e={id:uid(),date:new Date().toISOString(),mode:'mesure',ficheId:f.id,ficheNom:f.nom};e[kind]=v;state.journal.unshift(e);f.touched=Date.now();save();openDetail(f.id,true);toast(kind==='intensite'?'Intensité notée':'Maîtrise notée')}

/* ============ audience guidée (travail de fond) ============ */

function openAudienceFor(id){const f=state.fiches.find(x=>x.id===id);openAudience();if(f){A.ficheId=f.id;A.nom=f.nom;A.forme=f.forme;A.col=ficheColor(f);A.office=f.office||'';renderAudience()}}

    ${state.fiches.length?`<div class="field"><label class="f">Un esprit déjà connu&nbsp;?</label><select class="t" onchange="pickExisting(this.value)"><option value="">— nouvel esprit —</option>${opts}</select></div>`:''}

      ${circleTriangleStage(`<span id="aSeal" class="manifest">${sealBlock(A.nom||'esprit',56,A.forme,A.col)}</span>`,A.col)}

    ${known
      ? `<button class="btn gold wide" onclick="audienceToConj()">Le faire venir au centre</button>`
      : `<button class="btn gold wide" onclick="audienceFillFiche()">Remplir sa fiche</button>`}`;
  } else if(s===4){
    body=`<div class="phase"><div class="num">Phase IV</div><h2>La Conjuration</h2><div class="role">le dialogue — comprendre ce qu'il veut</div></div>
    ${circleTriangleStage(`<span class="seal-breathe">${sealBlock(A.nom||'esprit',54,A.forme,A.col)}</span>`,A.col,false)}
    <p class="rite-intro">Tu lui poses des questions — non comme à un ennemi, mais comme à un messager. Derrière toute ombre se cache une bonne intention&nbsp;; laisse-le te dire ce qu'il essaie de protéger.</p>
    <div class="field"><label class="f">« Qu'est-ce que tu essaies de faire pour moi&nbsp;? »</label><textarea class="t" id="aOffice" placeholder="ex. me pousser à bien faire, m'éviter une humiliation">${esc(A.office)}</textarea></div>
    <div class="field"><label class="f">« De quoi tu me protèges&nbsp;? » — la peur cachée dessous</label><textarea class="t" id="aPeur" placeholder="ex. la peur de ne pas compter, d'être rejeté">${esc(A.peur)}</textarea></div>
    <button class="btn gold wide" onclick="saveConj()">J'ai compris ce qu'il veut</button>`;
  } else if(s===5){
    body=`<div class="phase"><div class="num">Phase V</div><h2>Les Légions</h2><div class="role">d'où il vient, et quand il se réveille</div></div>
    ${circleTriangleStage(`<span class="seal-breathe">${sealBlock(A.nom||'esprit',54,A.forme,A.col)}</span>`,A.col,false)}
    <p class="rite-intro">Chaque esprit a ses racines et ses moments&nbsp;: les heures, les lieux, les visages qui le réveillent. Les repérer, c'est cesser d'être pris par surprise.</p>
    <div class="field"><label class="f">« Depuis quand es-tu là&nbsp;? » — d'où il vient</label><textarea class="t" id="aOrigine" placeholder="ex. depuis l'enfance, depuis ce poste, depuis une rupture…">${esc(A.origine)}</textarea></div>
    <div class="field"><label class="f">Dans quelles situations il revient le plus&nbsp;? — ses déclencheurs</label><textarea class="t" id="aLeg" placeholder="ex. en réunion, le soir, face à l'autorité…">${esc(A.legions)}</textarea></div>
    <button class="btn gold wide" onclick="saveLegions()">Je connais ses déclencheurs</button>`;
  } else {
    body=`<div class="phase"><div class="num">Phase VI</div><h2>Le Congé</h2><div class="role">garder ce qui est juste, lâcher ce qui pèse</div></div>
    ${circleTriangleStage(`<span class="dissolve">${sealBlock(A.nom||'esprit',54,A.forme,A.col)}</span>`,A.col,false)}
    <p class="rite-intro">Tu as écouté jusqu'au bout. Maintenant, tu fais le tri&nbsp;: tu gardes le besoin, qui est juste, et tu laisses partir la façon de faire qui ne te correspond pas. On ne chasse pas une part de soi — on la remercie, et on la laisse refluer.</p>
    <div class="field"><label class="f">Ce que je garde — le vrai besoin, en dessous</label><textarea class="t" id="aGarde" placeholder="ex. être reconnu pour mon travail">${esc(A.garde)}</textarea></div>
    <div class="field"><label class="f">Ce que je lâche — la réaction qui me pèse</label><textarea class="t" id="aLaisse" placeholder="ex. ruminer toute la soirée">${esc(A.laisse)}</textarea></div>
    <div class="field"><label class="f">Un petit pas pour demain — répondre à ce besoin autrement</label><textarea class="t" id="aPas" placeholder="ex. demander un avis à un collègue au lieu de ruminer">${esc(A.pas)}</textarea></div>
    <div class="anchor" style="font-size:16.5px">« J'ai entendu ce que tu protèges, et je t'en remercie.<br>Tu peux te retirer. »</div>
    <button class="btn gold wide" onclick="closeAudience()">Clore l'audience</button>`;
  }
  modal(`${riteVeil(A,kind)}${soundBtn()}<button class="close" onclick="closeModal()">&times;</button><div class="steps">${dots}</div><div class="rite">${body}${s>1?`<button class="btn ghost wide" style="margin-top:10px" onclick="audienceBack()">‹ Étape précédente</button>`:''}</div>`);
}
function pickExisting(id){
  if(!id){A.ficheId=null;A.forme=null;A.col='#C7A24B';A.nom='';renderAudience();return}
  const f=state.fiches.find(x=>x.id===id);if(!f)return;
  A.ficheId=id;A.nom=f.nom;A.forme=f.forme;A.col=ficheColor(f);if(!A.office)A.office=f.office||'';if(!A.legions)A.legions=f.legions||'';
  renderAudience();
}
function audienceToConj(){if(!A.ficheId){const el=document.getElementById('aNom');if(el)A.nom=(el.value||'').trim()}if(!A.nom){toast('Donne-lui un nom');return}A.step=4;renderAudience()}
function audienceFillFiche(){if(!A.ficheId){const el=document.getElementById('aNom');if(el)A.nom=(el.value||A.nom||'').trim()}ficheInitNom=A.nom||'';ficheBackFn=function(){A.step=3;renderAudience()};ficheReturn=function(id){const f=state.fiches.find(x=>x.id===id);A.ficheId=id;if(f){A.nom=f.nom;A.forme=f.forme;A.col=ficheColor(f);if(!A.office)A.office=f.office||'';if(!A.legions)A.legions=f.legions||''}A.step=4;renderAudience()};openFiche(A.ficheId||null)}
function saveConj(){A.office=document.getElementById('aOffice').value.trim();A.peur=document.getElementById('aPeur').value.trim();A.step=5;renderAudience()}
function saveLegions(){A.origine=document.getElementById('aOrigine').value.trim();A.legions=document.getElementById('aLeg').value.trim();A.step=6;renderAudience()}
function closeAudience(){
  A.garde=document.getElementById('aGarde').value.trim();
  A.laisse=document.getElementById('aLaisse').value.trim();
  A.pas=document.getElementById('aPas').value.trim();
  let f=A.ficheId?state.fiches.find(x=>x.id===A.ficheId):state.fiches.find(x=>x.nom.toLowerCase()===A.nom.toLowerCase());
  if(!f){f={id:uid(),nom:A.nom,forme:A.forme||GLYPHS[0],rang:'Présence',famille:'',office:'',legions:'',conge:'J\'ai entendu ce que tu protèges, et je t\'en remercie. Tu peux te retirer maintenant. Je garde le besoin ; je laisse la façon de faire qui ne me correspond pas.',notes:'',created:Date.now()};state.fiches.unshift(f)}
  f.touched=Date.now();
  if(A.office)f.office=A.office;
  if(A.legions&&!f.legions)f.legions=A.legions;else if(A.declencheur&&!f.legions)f.legions=A.declencheur;
  state.journal.unshift({id:uid(),date:new Date().toISOString(),mode:'audience',ficheId:f.id,ficheNom:f.nom,intensite:A.intensite,declencheur:A.declencheur,office:A.office,peur:A.peur,origine:A.origine,legions:A.legions,garde:A.garde,laisse:A.laisse,pas:A.pas,pasDone:false});
  riteCue('release');save();closeModal();view='audiences';render();window.scrollTo(0,0);toast('Audience close · suivi mis à jour')
}

/* ============ rituel express (faire partir la force) ============ */
let X={};
function openExpress(){_riteActive=true;startDrone();X={step:1,ficheId:null,nom:'',col:'#C7A24B',forme:null,corps:'',intensite:7,besoin:'',laisse:'',intensiteApres:4};renderExpress()}
function openExpressFor(id){const f=state.fiches.find(x=>x.id===id);openExpress();if(f){X.ficheId=f.id;X.nom=f.nom;X.forme=f.forme;X.col=ficheColor(f);renderExpress()}}
function renderExpress(){
  const s=X.step;let body='';
  const kind=s===1?'enter':s===4?'release':'step';
  const dots=[1,2,3,4,5].map(i=>`<div class="step-dot ${i<=s?'on':''}"></div>`).join('');
  if(s===1){
    const known=X.ficheId?state.fiches.find(x=>x.id===X.ficheId):null;
    const opts=state.fiches.map(f=>`<option value="${f.id}" ${X.ficheId===f.id?'selected':''}>${esc(f.nom)}</option>`).join('');
    body=`<div class="phase"><div class="num">Express · I</div><h2>Nommer</h2><div class="role">qu'est-ce qui te submerge, là&nbsp;?</div></div>
    <p class="rite-intro">Quelque chose monte et veut te prendre. Avant qu'elle t'emporte, donne-lui un nom&nbsp;: nommer, c'est déjà reprendre la main.</p>
    ${state.fiches.length?`<div class="field"><label class="f">Un esprit déjà connu&nbsp;?</label><select class="t" onchange="pickExpress(this.value)"><option value="">— nouveau —</option>${opts}</select></div>`:''}
    ${known
      ? `${circleTriangleStage(`<span class="manifest">${sealBlock(known.nom,56,known.forme,X.col)}</span>`,X.col)}
      ${known.famille?`<div style="text-align:center;margin-top:2px"><span class="fam-tag" style="color:${famColor(known.famille)};border-color:${famColor(known.famille)}">${esc(known.famille)}</span></div>`:''}`
      : `<div class="field"><label class="f">Son nom, ou un mot</label><input class="t" id="xNom" value="${esc(X.nom)}" placeholder="ex. la Panique, le Juge" oninput="X.nom=this.value;document.getElementById('xSeal').innerHTML=sealBlock(this.value||'esprit',56,X.forme,X.col)"></div>
      ${circleTriangleStage(`<span id="xSeal" class="manifest">${sealBlock(X.nom||'esprit',56,X.forme,X.col)}</span>`,X.col)}
      <p class="faint" style="font-size:12px;text-align:center;margin-bottom:4px">Un nouvel esprit&nbsp;: tu peux remplir sa fiche, ou le regarder tout de suite.</p>`}
    ${known
      ? `<button class="btn gold wide" onclick="X.step=2;renderExpress()">Le regarder en face</button>`
      : `<button class="btn gold wide" onclick="expressFillFiche()">Remplir sa fiche</button>
      <button class="btn ghost wide" style="margin-top:10px" onclick="X.nom=(document.getElementById('xNom').value||'').trim();if(!X.nom){toast('Nomme l\'esprit')}else{X.step=2;renderExpress()}">Juste le regarder maintenant</button>`}`;
  } else if(s===2){
    body=`<div class="phase"><div class="num">Express · II</div><h2>Où ça se loge</h2><div class="role">dans le corps, et à combien</div></div>
    ${circleTriangleStage(`<span class="seal-breathe">${sealBlock(X.nom||'esprit',54,X.forme,X.col)}</span>`,X.col,false)}
    <p class="rite-intro">Trouve-la dans le corps. Une émotion nommée et située cesse d'être toi&nbsp;: elle devient quelque chose que tu regardes.</p>
    <div class="field"><label class="f">Où la sens-tu dans le corps&nbsp;? (un mot)</label><input class="t" id="xCorps" value="${esc(X.corps)}" placeholder="gorge, poitrine, ventre, mâchoire…"></div>
    <div class="field"><label class="f">À combien elle te submerge&nbsp;?</label>${intensityField('xInt',X.intensite)}</div>
    <button class="btn gold wide" onclick="X.corps=document.getElementById('xCorps').value.trim();X.intensite=+document.getElementById('xInt').value;X.step=3;renderExpress()">Continuer</button>`;
  } else if(s===3){
    body=`<div class="phase"><div class="num">Express · III</div><h2>Le souffle</h2><div class="role">quelques respirations, et tu redescends</div></div>
    ${circleStage(breathOrb(),X.col,190)}
    <p class="rite-intro">Reste là, le temps de quelques souffles. Inspire le calme, expire la charge. Tu n'as rien d'autre à faire que respirer.</p>
    <div class="field"><label class="f">Un mot pour ce dont tu as besoin, là</label><input class="t" id="xBesoin" value="${esc(X.besoin)}" placeholder="ex. souffler, sécurité, douceur"></div>
    <button class="btn gold wide" onclick="X.besoin=document.getElementById('xBesoin').value.trim();X.step=4;renderExpress()">J'ai respiré</button>`;
  } else if(s===4){
    body=`<div class="phase"><div class="num">Express · IV</div><h2>Le congé</h2><div class="role">tu n'es pas elle — tu la renvoies</div></div>
    ${circleTriangleStage(`<span class="dissolve">${sealBlock(X.nom||'esprit',54,X.forme,X.col)}</span>`,X.col,false)}
    <p class="rite-intro">Tu n'es pas elle. Inspire en gardant le vrai besoin, expire en sentant la réaction se détacher du corps.</p>
    <div class="anchor">« Je ne suis pas ça.<br>Je garde le vrai besoin, je lâche la réaction. »</div>
    <div class="field"><label class="f">Ce que je lâche (facultatif)</label><input class="t" id="xLaisse" value="${esc(X.laisse)}" placeholder="ex. la colère, la panique, en un mot"></div>
    <button class="btn gold wide" onclick="X.laisse=document.getElementById('xLaisse').value.trim();X.step=5;renderExpress()">Je la laisse partir</button>`;
  } else {
    body=`<div class="phase"><div class="num">Express · V</div><h2>Après</h2><div class="role">regarde le chemin parcouru</div></div>
    ${circleStage(breathOrb(),X.col,190)}
    <p class="rite-intro">Reviens à toi. Où en est la vague, maintenant&nbsp;? Même un cran plus bas, c'est déjà repris.</p>
    <div class="field"><label class="f">À combien la sens-tu, maintenant&nbsp;?</label>${intensityField('xApres',X.intensiteApres)}</div>
    <p class="faint" style="text-align:center;font-size:11px">Au départ&nbsp;: ${X.intensite}/10</p>
    <button class="btn gold wide" onclick="closeExpress()">C'est passé</button>`;
  }
  modal(`${riteVeil(X,kind)}${soundBtn()}<button class="close" onclick="closeModal()">&times;</button><div class="steps">${dots}</div><div class="rite">${body}${s>1?`<button class="btn ghost wide" style="margin-top:10px" onclick="expressBack()">‹ Étape précédente</button>`:''}</div>`);
}
function pickExpress(id){if(!id){X.ficheId=null;X.forme=null;X.col='#C7A24B';X.nom='';renderExpress();return}const f=state.fiches.find(x=>x.id===id);if(!f)return;X.ficheId=id;X.nom=f.nom;X.forme=f.forme;X.col=ficheColor(f);renderExpress()}
function expressFillFiche(){if(!X.ficheId){const el=document.getElementById('xNom');if(el)X.nom=(el.value||X.nom||'').trim()}if(!X.nom){toast('Nomme l\'esprit');return}ficheInitNom=X.nom||'';ficheBackFn=function(){X.step=1;renderExpress()};ficheReturn=function(id){const f=state.fiches.find(x=>x.id===id);X.ficheId=id;if(f){X.nom=f.nom;X.forme=f.forme;X.col=ficheColor(f)}X.step=2;renderExpress()};openFiche(X.ficheId||null)}
function closeExpress(){
  const ap=document.getElementById('xApres');if(ap)X.intensiteApres=+ap.value;
  const nom=X.nom||'Reprise express';
  let f=X.ficheId?state.fiches.find(x=>x.id===X.ficheId):state.fiches.find(x=>x.nom.toLowerCase()===nom.toLowerCase());
  if(f)f.touched=Date.now();
  state.journal.unshift({id:uid(),date:new Date().toISOString(),mode:'express',ficheId:f?f.id:null,ficheNom:nom,intensite:X.intensite,intensiteApres:X.intensiteApres,corps:X.corps,besoin:X.besoin,laisse:X.laisse,pasDone:false});
  riteCue('step');save();closeModal();view='audiences';render();window.scrollTo(0,0);toast('Esprit renvoyé · reprends ta journée')
}

/* ============ La Charge (commander la faculté, la cultiver) ============ */
let C={};
function openCharge(){_riteActive=true;startDrone();C={step:1,ficheId:null,nom:'',col:'#C7A24B',forme:null,capacite:'',charge:'',desir:'',pacte:'',maitrise:5};renderCharge()}
function openChargeFor(id){const f=state.fiches.find(x=>x.id===id);openCharge();if(f){C.ficheId=f.id;C.nom=f.nom;C.forme=f.forme;C.col=ficheColor(f);C.capacite=f.office||'';C.desir=f.desir||'';renderCharge()}}
function renderCharge(){
  const s=C.step;let body='';
  const kind=s===1?'enter':s===2?'name':s===6?'seal':'step';
  const dots=[1,2,3,4,5,6].map(i=>`<div class="step-dot ${i<=s?'on':''}"></div>`).join('');
  if(s===1){
    body=`<div class="phase"><div class="num">Charge · I</div><h2>Le Seuil</h2><div class="role">fixer le cap</div></div>
    ${circleStage(flameSVG(C.col),C.col,200)}
    <p class="rite-intro">Donner une charge, c'est te mettre au travail sur toi. Avant de convoquer l'esprit, fixe le cap&nbsp;: la version de toi que tu veux faire monter.</p>
    <div class="anchor" style="font-size:16px">« Je ne subis plus cet esprit.<br>Je vais le diriger. »</div>
    <div class="field"><label class="f">Vers quelle meilleure version de toi&nbsp;? — le cap</label><textarea class="t" id="cDesir0" placeholder="ex. devenir quelqu'un dont la parole porte">${esc(C.desir)}</textarea></div>
    <button class="btn gold wide" onclick="C.desir=document.getElementById('cDesir0').value.trim();C.step=2;renderCharge()">Je fixe le cap</button>`;
  } else if(s===2){
    const known=C.ficheId?state.fiches.find(x=>x.id===C.ficheId):null;
    const opts=state.fiches.map(f=>`<option value="${f.id}" ${C.ficheId===f.id?'selected':''}>${esc(f.nom)}</option>`).join('');
    body=`<div class="phase"><div class="num">Charge · II</div><h2>Convocation</h2><div class="role">non pour le chasser — pour le mettre au travail</div></div>
    <p class="rite-intro">Tu ne le combats pas&nbsp;: tu le convoques. Dans le triangle, l'esprit se présente — non pour être chassé, mais pour être mis au travail.</p>
    ${state.fiches.length?`<div class="field"><label class="f">Quel esprit convoques-tu&nbsp;?</label><select class="t" onchange="pickCharge(this.value)"><option value="">— nouveau —</option>${opts}</select></div>`:''}
    ${known
      ? `${circleTriangleStage(`<span class="manifest">${sealBlock(known.nom,56,known.forme,C.col)}</span>`,C.col)}
      ${known.famille?`<div style="text-align:center;margin-top:2px"><span class="fam-tag" style="color:${famColor(known.famille)};border-color:${famColor(known.famille)}">${esc(known.famille)}</span></div>`:''}
      <div style="text-align:center"><button class="btn sm ghost" style="margin-top:12px" onclick="chargeFillFiche()">Éditer sa fiche</button></div>`
      : `<div class="field"><input class="t" id="cNom" value="${esc(C.nom)}" placeholder="son nom (ex. l'Orateur, le Stratège)" oninput="C.nom=this.value;document.getElementById('cSeal').innerHTML=sealBlock(this.value||'esprit',56,C.forme,C.col)"></div>
      ${circleTriangleStage(`<span id="cSeal" class="manifest">${sealBlock(C.nom||'esprit',56,C.forme,C.col)}</span>`,C.col)}
      <p class="faint" style="font-size:12px;text-align:center;margin-bottom:4px">Un nouvel esprit se définit d'abord par sa fiche.</p>`}
    <div class="anchor" style="font-size:16px">« Esprit, je te convoque.<br>Tu vas travailler pour moi. »</div>
    ${known
      ? `<button class="btn gold wide" onclick="chargeStep1Next()">Il se présente</button>`
      : `<button class="btn gold wide" onclick="chargeFillFiche()">Remplir sa fiche</button>`}`;
  } else if(s===3){
    body=`<div class="phase"><div class="num">Charge · III</div><h2>Sa capacité</h2><div class="role">reconnaître son don avant de l'employer</div></div>
    ${circleTriangleStage(`<span class="seal-breathe">${sealBlock(C.nom||'esprit',54,C.forme,C.col)}</span>`,C.col,false)}
    <p class="rite-intro">Avant de lui donner un ordre, reconnais ce qu'il sait faire. Toute pulsion cache une vraie compétence&nbsp;: nomme-la — c'est elle que tu vas diriger.</p>
    <div class="field"><label class="f">Qu'est-ce qu'il sait faire pour toi&nbsp;?</label><textarea class="t" id="cCap" placeholder="ex. tenir l'effort longtemps, trancher vite, convaincre, poser une limite">${esc(C.capacite)}</textarea></div>
    <button class="btn gold wide" onclick="C.capacite=document.getElementById('cCap').value.trim();C.step=4;renderCharge()">Je vois ce qu'il sait faire</button>`;
  } else if(s===4){
    body=`<div class="phase"><div class="num">Charge · IV</div><h2>La charge</h2><div class="role">lui faire comprendre ce que tu veux</div></div>
    ${circleTriangleStage(`<span class="seal-breathe">${sealBlock(C.nom||'esprit',54,C.forme,C.col)}</span>`,C.col,false)}
    <p class="rite-intro">Tu lui confies une mission. Dis-la nettement&nbsp;: un esprit n'obéit qu'à une intention claire.</p>
    <div class="anchor" style="font-size:16px">« Je te confie ceci à accomplir… »</div>
    <div class="field"><label class="f">Ce que tu attends de lui, précisément</label><textarea class="t" id="cCharge" placeholder="ex. me faire parler clairement en réunion sans me couper">${esc(C.charge)}</textarea></div>
    ${C.desir?`<p class="faint" style="font-size:11.5px;margin-top:-2px">Au service de ton cap&nbsp;: <span style="color:var(--muted)">${esc(C.desir)}</span></p>`:''}
    <button class="btn gold wide" onclick="C.charge=document.getElementById('cCharge').value.trim();if(!C.charge){toast('Donne-lui sa charge')}else{C.step=5;renderCharge()}">La charge est dite</button>`;
  } else if(s===5){
    body=`<div class="phase"><div class="num">Charge · V</div><h2>Le pacte</h2><div class="role">le mettre concrètement au travail</div></div>
    ${circleTriangleStage(`<span class="seal-breathe">${sealBlock(C.nom||'esprit',54,C.forme,C.col)}</span>`,C.col,false)}
    <p class="rite-intro">Un esprit se dresse par la répétition. Donne-lui un geste, un quand, un où&nbsp;: c'est le pacte — sa manière d'obéir.</p>
    <div class="field"><label class="f">Le pacte — l'action quotidienne qui l'entraîne</label><textarea class="t" id="cPacte" placeholder="ex. dès qu'on m'interroge en réunion, je prends une respiration puis je parle">${esc(C.pacte)}</textarea></div>
    <button class="btn gold wide" onclick="C.pacte=document.getElementById('cPacte').value.trim();C.step=6;renderCharge()">Sceller le pacte</button>`;
  } else {
    const kf=C.ficheId?state.fiches.find(x=>x.id===C.ficheId):null;
    const ange=(kf?kf.nom:C.nom)+' ange';
    body=`<div class="phase"><div class="num">Charge · VI</div><h2>Le sceau</h2><div class="role">sceller, noter, renvoyer</div></div>
    ${circleTriangleStage(`<span class="seal-breathe">${sealBlock(ange,54,C.forme,C.col)}</span>`,C.col,false)}
    <p class="rite-intro">Tu appelles sa belle version&nbsp;: <b style="color:#F1EADb;font-style:normal">${esc(ange)}</b>. C'est le cap vers lequel tu montes. Note où tu en es aujourd'hui, puis laisse-le partir au travail.</p>
    <div class="field"><label class="f">À combien tu maîtrises ça, aujourd'hui&nbsp;? (0 = pas du tout, 10 = parfaitement)</label>${intensityField('cMaitrise',C.maitrise)}</div>
    <div class="anchor" style="font-size:16px">« Va, mets-toi au travail,<br>et reviens quand je t'appelle. »</div>
    <button class="btn gold wide" onclick="closeCharge()">Sceller la charge</button>`;
  }
  modal(`${riteVeil(C,kind)}${soundBtn()}<button class="close" onclick="closeModal()">&times;</button><div class="steps">${dots}</div><div class="rite">${body}${s>1?`<button class="btn ghost wide" style="margin-top:10px" onclick="chargeBack()">‹ Étape précédente</button>`:''}</div>`);
}
function pickCharge(id){if(!id){C.ficheId=null;C.forme=null;C.col='#C7A24B';C.nom='';renderCharge();return}const f=state.fiches.find(x=>x.id===id);if(!f)return;C.ficheId=id;C.nom=f.nom;C.forme=f.forme;C.col=ficheColor(f);C.capacite=f.office||'';if(!C.desir)C.desir=f.desir||'';renderCharge()}
function chargeStep1Next(){if(!C.ficheId){const el=document.getElementById('cNom');if(el)C.nom=(el.value||'').trim()}if(!C.nom){toast('Nomme l\'esprit');return}C.step=3;renderCharge()}
function chargeFillFiche(){if(!C.ficheId){const el=document.getElementById('cNom');if(el)C.nom=(el.value||C.nom||'').trim()}ficheInitNom=C.nom||'';ficheBackFn=function(){C.step=2;renderCharge()};ficheReturn=function(id){const f=state.fiches.find(x=>x.id===id);C.ficheId=id;if(f){C.nom=f.nom;C.forme=f.forme;C.col=ficheColor(f);C.capacite=f.office||'';if(!C.desir)C.desir=f.desir||''}C.step=3;renderCharge()};openFiche(C.ficheId||null)}
function closeCharge(){
  C.maitrise=+document.getElementById('cMaitrise').value;
  let f=C.ficheId?state.fiches.find(x=>x.id===C.ficheId):state.fiches.find(x=>x.nom.toLowerCase()===C.nom.toLowerCase());
  if(!f){f={id:uid(),nom:C.nom,forme:C.forme||GLYPHS[0],rang:'Présence',famille:'',office:'',desir:'',legions:'',conge:'J\'ai entendu ce que tu protèges, et je t\'en remercie. Tu peux te retirer maintenant. Je garde le besoin ; je laisse la façon de faire qui ne me correspond pas.',notes:'',created:Date.now()};state.fiches.unshift(f)}
  f.touched=Date.now();
  if(C.capacite)f.office=C.capacite;
  if(C.desir)f.desir=C.desir;
  entriesFor(f).forEach(e=>{if(e.mode==='charge')e.active=false});
  state.journal.unshift({id:uid(),date:new Date().toISOString(),mode:'charge',ficheId:f.id,ficheNom:f.nom,capacite:C.capacite,charge:C.charge,desir:C.desir,maitrise:C.maitrise,pas:C.pacte,active:true,log:[]});
  riteCue('seal');save();closeModal();view='charges';render();window.scrollTo(0,0);toast('Charge scellée · l\'esprit est au travail')
}

/* ============ utilitaires UI ============ */
function modal(html,keepScroll){
  let s=document.getElementById('scrim');let prev=0;
  if(!s){s=document.createElement('div');s.id='scrim';s.className='scrim';s.onclick=e=>{if(e.target===s)closeModal()};document.body.appendChild(s)}
  else if(keepScroll){const m=s.querySelector('.modal');if(m)prev=m.scrollTop}
  s.innerHTML=`<div class="modal">${html}</div>`;
  if(keepScroll){const m=s.querySelector('.modal');if(m)m.scrollTop=prev}
}
function closeModal(){_riteActive=false;stopDrone();const s=document.getElementById('scrim');if(s)s.remove();ficheReturn=null;ficheInitNom='';ficheBackFn=null}
function ficheGoBack(){const fn=ficheBackFn;ficheBackFn=null;ficheReturn=null;ficheInitNom='';editId=null;pickedGlyph=null;if(fn){fn()}else{closeModal()}}
function gv(id){const e=document.getElementById(id);return e?e.value:undefined}
function captureAudience(){let v;
  if((v=gv('aDecl'))!==undefined)A.declencheur=v.trim();
  if((v=gv('aInt'))!==undefined)A.intensite=+v;
  if((v=gv('aNom'))!==undefined)A.nom=v.trim();
  if((v=gv('aOffice'))!==undefined)A.office=v.trim();
  if((v=gv('aPeur'))!==undefined)A.peur=v.trim();
  if((v=gv('aOrigine'))!==undefined)A.origine=v.trim();
  if((v=gv('aLeg'))!==undefined)A.legions=v.trim();
  if((v=gv('aGarde'))!==undefined)A.garde=v.trim();
  if((v=gv('aLaisse'))!==undefined)A.laisse=v.trim();
  if((v=gv('aPas'))!==undefined)A.pas=v.trim();}
function audienceBack(){captureAudience();if(A.step>1){A.step--;renderAudience()}}
function captureCharge(){let v;
  if((v=gv('cDesir0'))!==undefined)C.desir=v.trim();
  if((v=gv('cNom'))!==undefined)C.nom=v.trim();
  if((v=gv('cCap'))!==undefined)C.capacite=v.trim();
  if((v=gv('cCharge'))!==undefined)C.charge=v.trim();
  if((v=gv('cPacte'))!==undefined)C.pacte=v.trim();
  if((v=gv('cMaitrise'))!==undefined)C.maitrise=+v;}
function chargeBack(){captureCharge();if(C.step>1){C.step--;renderCharge()}}
function captureExpress(){let v;
  if((v=gv('xNom'))!==undefined)X.nom=v.trim();
  if((v=gv('xCorps'))!==undefined)X.corps=v.trim();
  if((v=gv('xInt'))!==undefined)X.intensite=+v;
  if((v=gv('xBesoin'))!==undefined)X.besoin=v.trim();
  if((v=gv('xLaisse'))!==undefined)X.laisse=v.trim();
  if((v=gv('xApres'))!==undefined)X.intensiteApres=+v;}
function expressBack(){captureExpress();if(X.step>1){X.step--;renderExpress()}}
function toast(msg){const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2200)}
function fmtDate(iso){const d=new Date(iso);return d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'})+' · '+d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}

function exportData(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='goetie-interieure.json';a.click();toast('Exporté')
}
function importData(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);if(d.fiches&&d.journal){state=d;save();render();toast('Importé')}else toast('Fichier non reconnu')}catch(x){toast('Lecture impossible')}};r.readAsText(file)
}

/* ============ navigation ============ */
const TABS=[
  {id:'guide',label:'Guide',icon:'<circle cx="12" cy="12" r="9"/><path d="M12 16v-4M12 8h.01"/>'},
  {id:'catalogue',label:'Esprits',icon:'<rect x="4" y="4" width="7" height="7" rx="1"/><rect x="13" y="4" width="7" height="7" rx="1"/><rect x="4" y="13" width="7" height="7" rx="1"/><rect x="13" y="13" width="7" height="7" rx="1"/>'},
  {id:'audiences',label:'Audiences',icon:'<circle cx="12" cy="12" r="9"/><path d="M8 12h8M12 8v8" opacity=".5"/>'},
  {id:'charges',label:'Charges',icon:'<path d="M13 2L4 14h6l-1 8 9-12h-6z"/>'},
  {id:'journal',label:'Registre',icon:'<path d="M5 4h11l3 3v13H5z"/><path d="M9 9h6M9 13h6"/>'},
];
function renderTabs(){
  document.getElementById('tabs').innerHTML=TABS.map(t=>
    `<button class="tab ${view===t.id?'on':''}" data-tab="${t.id}" onclick="go('${t.id}')">
      <svg viewBox="0 0 24 24">${t.icon}</svg>${t.label}</button>`).join('');
  const on=document.querySelector('.tab.on');if(on&&on.scrollIntoView)on.scrollIntoView({inline:'center',block:'nearest'});
}
function go(v){view=v;render();window.scrollTo(0,0)}

render();
